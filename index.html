<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@r</title>
    
    <link class="site-favicon" rel="icon" type="image/png" href="a2fd3e36-e87f-4a19-bae3-2e28aedf8cb1.png">
    
    <style>
        :root {
            --text-main: #ffffff;
            --text-sub: #d4d4d8; 
            --bg-image: url('image_51ee3f.jpg'); 
            
            /* Your Nitro Badges Roll GIF */
            --custom-badge-url: url('https://cdn3.emoji.gg/emojis/3190-nitrobadgesroll.gif');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            width: 100%;
            max-width: 640px;
            padding: 40px;
            position: relative;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.1s ease-out;
        }

        .card-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .view-counter {
            font-size: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .view-icon {
            width: 16px;
            height: 16px;
            opacity: 0.8;
        }

        .profile-main {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }

        .profile-headline-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .profile-title {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -1px;
            min-width: 40px;
        }

        .custom-pill-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .badge-icon {
            width: 20px;
            height: 20px;
            background-image: var(--custom-badge-url);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent; 
        }

        .profile-subtext {
            font-size: 16px;
            color: var(--text-sub);
            margin-top: 4px;
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
        }

        .widget-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .dynamic-widget {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            min-height: 114px; 
            width: 100%;
            overflow: hidden;
        }

        .widget-anim-target {
            transition: opacity 0.25s ease, transform 0.25s ease;
            opacity: 1;
            transform: translateX(0);
        }

        .widget-anim-target.swipe-hide {
            opacity: 0;
            transform: translateX(-15px);
        }

        .widget-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .widget-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(0, 0, 0, 0.5);
        }

        .widget-info-block h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .widget-username-sub {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 6px;
            display: block;
        }

        .widget-badge-img {
            height: 16px;
            object-fit: contain;
        }

        .widget-stats-row {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: var(--text-sub);
            align-items: center;
        }

        .stat-dot-separator {
            opacity: 0.5;
            font-size: 11px;
        }

        .widget-stats-row strong {
            color: #ffffff;
            font-weight: 600;
        }

        .platform-label-tag {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        .view-profile-action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 10px;
            transition: background 0.2s, transform 0.2s;
            margin-top: auto;
            align-self: flex-end;
        }

        .view-profile-action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .widget-dots-nav {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .nav-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-dot:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .nav-dot.active {
            background: #ffffff;
            transform: scale(1.1);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="profile-card" id="tilt-card">
        <div class="card-top">
            <div class="view-counter">
                <svg class="view-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <span id="view-count">1242</span>
            </div>
        </div>

        <div class="profile-main">
            <div class="profile-headline-container">
                <h1 class="profile-title" id="main-display-name">r</h1>
                
                <div class="custom-pill-badge">
                    <div class="badge-icon"></div>
                </div>
            </div>
            <p class="profile-subtext">Money speaks sense in a language all nations understand.</
