<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@r</title>
    
    <link rel="icon" type="image/png" href="a2fd3e36-e87f-4a19-bae3-2e28aedf8cb1.png">
    
    <style>
        :root {
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.5); 
            --bg-image: url('image_51ee3f.jpg'); 
            --custom-badge-url: url('https://cdn3.emoji.gg/emojis/3190-nitrobadgesroll.gif');
            --accent-pink: #ffffff; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            overflow: hidden;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
        }

        /* --- UPDATED: 60% TRANSPARENT TINT BLUR OVERLAY (Reveals background content underneath) --- */
        #entry-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.08); /* Transparent layout white tint balance */
            backdrop-filter: blur(14px) brightness(0.6); /* Softened blur and optimized brightness matrix for 60% clear pass-through */
            -webkit-backdrop-filter: blur(14px) brightness(0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        
        #entry-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* --- MONOSPACE WHITE CLICK WITH SHADOW --- */
        #entry-text {
            color: var(--text-main); 
            font-family: "Courier New", Courier, Courier Prime, Monaco, monospace; 
            font-size: 48px; 
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.5); 
            user-select: none;
        }

        /* --- CONTAINER WRAPPERS --- */
        #scroll-wrapper {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .page-section {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
            pointer-events: none;
        }

        .page-section.active-page {
            pointer-events: auto;
        }

        #page-1 { transform: translateY(0vh); }
        #page-2 { transform: translateY(100vh); }

        /* --- BALANCED DIRECTIONAL SCROLL TRANSITIONS (2s) --- */
        .scroll-animated {
            opacity: 0;
            transition: transform 2s cubic-bezier(0.15, 0.85, 0.25, 1), opacity 2s cubic-bezier(0.15, 0.85, 0.25, 1);
        }

        .scroll-animated.active {
            opacity: 1;
            transform: translateY(0) !important;
        }

        .fade-from-bottom {
            transform: translateY(120px);
        }

        .fade-from-top {
            transform: translateY(-120px);
        }

        /* --- FIRST PAGE SPECIFICS --- */
        #first-page-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            position: relative;
        }

        #first-page-view img {
            max-width: 90%;
            max-height: 70vh;
            object-fit: contain;
        }

        .scroll-hint-wrapper {
            position: absolute;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            user-select: none;
            animation: floatIndicator 3.0s ease-in-out infinite;
        }

        .scroll-hint {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        .scroll-arrow {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: bold;
        }

        @keyframes floatIndicator {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            50% {
                transform: translateY(12px);
                opacity: 0.9;
            }
        }

        /* --- SECOND PAGE SPECIFICS --- */
        .page-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 640px;
            align-items: center;
            perspective: 1000px;
        }

        /* --- MAIN PROFILE CARD --- */
        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            width: 100%;
            padding: 40px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .card-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .view-counter {
            font-size: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            opacity: 0.8;
        }

        .view-icon {
            width: 16px;
            height: 16px;
        }

        .profile-main {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }

        .profile-headline-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .profile-title {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .custom-pill-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .badge-icon {
            width: 20px;
            height: 20px;
            background-image: var(--custom-badge-url);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        .profile-subtext {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }

        /* --- PLATFORM ROTATOR --- */
        .dynamic-widget {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            min-height: 114px; 
            width: 100%;
        }

        .widget-anim-target {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .widget-anim-target.swipe-hide {
            opacity: 0;
            transform: translateX(-15px);
        }

        .widget-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .widget-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
        }

        .widget-info-block h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .widget-username-sub {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 6px;
            display: block;
        }

        .widget-badge-img {
            height: 16px;
        }

        .widget-stats-row {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .stat-dot-separator {
            opacity: 0.5;
        }

        .platform-label-tag {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .view-profile-action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 10px;
            transition: background 0.2s;
            align-self: flex-end;
        }

        .view-profile-action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .widget-dots-nav {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .nav-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-dot.active {
            background: #ffffff;
            transform: scale(1.2);
        }

        /* --- FLOATING SONG WIDGET --- */
        .music-widget {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            gap: 16px;
        }

        .music-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 180px;
        }

        .music-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: spin 6s linear infinite;
            animation-play-state: paused;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-info {
            display: flex;
            flex-direction: column;
        }

        .music-info h4 {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .music-artist {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        .music-timeline-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .time-text {
            font-size: 12px;
            color: var(--text-sub);
            min-width: 32px;
        }

        .progress-container {
            flex-grow: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-pink);
            border-radius: 2px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .music-right-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            color: rgba(255, 255, 255, 0.4);
            padding-left: 8px;
        }

        .control-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .control-btn:hover { color: #fff; }
        .play-pause-btn { color: #fff; }
    </style>
</head>
<body>

    <!-- OVERLAY LAYER -->
    <div id="entry-overlay" onclick="dismissOverlay()">
        <div id="entry-text">click</div>
    </div>

    <!-- MAIN SCROLL VIEWS CONTAINER -->
    <div id="scroll-wrapper">

        <!-- PAGE 1 -->
        <section class="page-section active-page" id="page-1">
            <div id="first-page-view" class="scroll-animated active">
                <img src="main.png" alt="Main Display Image">
                <div class="scroll-hint-wrapper">
                    <span class="scroll-hint">scroll for more</span>
                    <span class="scroll-arrow">↓</span>
                </div>
            </div>
        </section>

        <!-- PAGE 2 -->
        <section class="page-section" id="page-2">
            <div class="page-container scroll-animated fade-from-bottom">
                
                <div class="profile-card" id="tilt-card">
                    <div class="card-top">
                        <div class="view-counter">
                            <svg class="view-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <span id="view-count">1247</span>
                        </div>
                    </div>

                    <div class="profile-main">
                        <div class="profile-headline-container">
                            <h1 class="profile-title" id="main-display-name">relapse</h1>
                            <div class="custom-pill-badge">
                                <div class="badge-icon"></div>
                            </div>
                        </div>
                        <p class="profile-subtext">Money speaks sense in a language all nations understand.</p>
                    </div>

                    <div class="dynamic-widget" id="platform-widget">
                        <div class="widget-left widget-anim-target" id="widget-content-left">
                            <img src="" alt="Avatar" class="widget-avatar" id="widget-pfp">
                            <div class="widget-info-block">
                                <h3>
                                    <span id="widget-display-name"></span>
                                    <img src="" alt="Verified" class="widget-badge-img" id="widget-verified-icon">
                                </h3>
                                <span id="widget-handle" class="widget-username-sub"></span>
                                <div class="widget-stats-row" id="widget-stats-container"></div>
                            </div>
                        </div>
                        <div class="platform-label-tag widget-anim-target" id="widget-platform-tag"></div>
                        <a href="" target="_blank" class="view-profile-action-btn widget-anim-target" id="widget-action-btn">View Profile ↗</a>
                    </div>

                    <div class="widget-dots-nav">
                        <div class="nav-dot active" onclick="manualPlatformSwitch(0)"></div>
                        <div class="nav-dot" onclick="manualPlatformSwitch(1)"></div>
                    </div>

                    <div class="music-widget">
                        <div class="music-left">
                            <img src="bluebands.webp" alt="Album Art" class="music-avatar" id="music-art">
                            <div class="music-info">
                                <h4>Blue Bands</h4>
                                <span class="music-artist">Weiland</span>
                            </div>
                        </div>
                        
                        <div class="music-timeline-container">
                            <span class="time-text" id="current-time">0:00</span>
                            <div class="progress-container" id="progress-container">
                                <div class="progress-bar" id="progress-bar"></div>
                            </div>
                            <span class="time-text" id="duration">0:00</span>
                        </div>

                        <div class="music-right-controls">
                            <button class="control-btn">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6L18 6v12z"/></svg>
                            </button>
                            <button class="control-btn play-pause-btn" id="play-btn">
                                <svg id="play-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                                <svg id="pause-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                            </button>
                            <button class="control-btn">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg>
                            </button>
                        </div>

                        <audio id="audio-element" src="BlueBands.mp3" preload="metadata"></audio>
                    </div>
                </div>

            </div>
        </section>

    </div>

    <script>
        let currentPage = 1;
        const totalPages = 2;
        let isScrolling = false;
        let isUnlocked = false; 

        const p1 = document.getElementById('page-1');
        const p2 = document.getElementById('page-2');
        const animatedP1 = p1.querySelector('.scroll-animated');
        const animatedP2 = p2.querySelector('.scroll-animated');

        function goToPage(pageIndex) {
            if (pageIndex < 1 || pageIndex > totalPages || pageIndex === currentPage) return;
            isScrolling = true;
            
            const goingDown = pageIndex > currentPage;
            currentPage = pageIndex;

            p1.style.transition = "transform 2s cubic-bezier(0.15, 0.85, 0.25, 1)";
            p2.style.transition = "transform 2s cubic-bezier(0.15, 0.85, 0.25, 1)";

            if (currentPage === 1) {
                p1.style.transform = "translateY(0vh)";
                p2.style.transform = "translateY(100vh)";
                p1.classList.add('active-page');
                p2.classList.remove('active-page');
            } else if (currentPage === 2) {
                p1.style.transform = "translateY(-100vh)";
                p2.style.transform = "translateY(0vh)";
                p2.classList.add('active-page');
                p1.classList.remove('active-page');
            }

            if (goingDown) {
                animatedP1.classList.remove('active', 'fade-from-bottom');
                animatedP1.classList.add('fade-from-top');
                animatedP2.classList.remove('fade-from-top');
                animatedP2.classList.add('fade-from-bottom');
                animatedP2.offsetHeight; 
                animatedP2.classList.add('active');
            } else {
                animatedP2.classList.remove('active', 'fade-from-top');
                animatedP2.classList.add('fade-from-bottom');
                animatedP1.classList.remove('fade-from-bottom');
                animatedP1.classList.add('fade-from-top');
                animatedP1.offsetHeight; 
                animatedP1.classList.add('active');
            }

            setTimeout(() => {
                isScrolling = false;
            }, 2000);
        }

        window.addEventListener('wheel', (e) => {
            if (!isUnlocked || isScrolling) return;
            if (e.deltaY > 15) {
                goToPage(currentPage + 1);
            } else if (e.deltaY < -15) {
                goToPage(currentPage - 1);
            }
        }, { passive: true });

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!isUnlocked || isScrolling) return;
            const touchEndY = e.touches[0].clientY;
            const diffY = touchStartY - touchEndY;

            if (diffY > 40) {
                goToPage(currentPage + 1);
            } else if (diffY < -40) {
                goToPage(currentPage - 1);
            }
        }, { passive: true });

        function dismissOverlay() {
            document.getElementById('entry-overlay').classList.add('fade-out');
            isUnlocked = true; 
            
            const audio = document.getElementById('audio-element');
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');
            const musicArt = document.getElementById('music-art');
            
            audio.play().then(() => {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                musicArt.style.animationPlayState = 'running';
            }).catch(err => console.log("Playback system initialized."));
        }

        const typingSequence = ["r", "re", "rel", "rela", "relap", "relaps", "relapse", "relaps", "relap", "rela", "rel", "re"];
        let typingIndex = 0;
        function handleTypecycleAnimations() {
            const currentString = typingSequence[typingIndex];
            document.title = "@" + currentString;
            document.getElementById('main-display-name').innerText = currentString;
            typingIndex = (typingIndex + 1) % typingSequence.length;
        }
        setInterval(handleTypecycleAnimations, 350);

        const platformData = [
            {
                platform: "Roblox",
                displayName: "yng",
                handle: "@yng",
                pfpUrl: "https://tr.rbxcdn.com/30DAY-AvatarHeadshot-593CFEAFA18BFC82D8469ED2DFBEF75B-Png/150/150/AvatarHeadshot/Webp/noFilter",
                verifiedIcon: "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fstatic.wikia.nocookie.net%2Froblox%2Fimages%2Fe%2Fe4%2FRoblox_Verified_Badge.png%2Frevision%2Flatest%2Fscale-to-width-down%2F180%3Fcb%3D20220920020249&f=1&nofb=1&ipt=7d50722c9e2fa2c32f96fce2804d9b98e543c3e1faca27c67c96578ff2f2340d",
                profileUrl: "https://www.roblox.com/users/1436002/profile",
                statsHtml: `<span><strong>0</strong> Following</span><span class="stat-dot-separator">•</span><span><strong>30</strong> Friends</span><span class="stat-dot-separator">•</span><span><strong>125.3K</strong> Followers</span>`
            },
            {
                platform: "TikTok",
                displayName: "ok",
                handle: "@dew",
                pfpUrl: "https://p16-common-sign.tiktokcdn-eu.com/tos-alisg-avt-0068/2332fd97c25e3a23702159acfe146043~tplv-tiktokx-cropcenter:1080:1080.jpeg?dr=10399&refresh_token=91ff4380&x-expires=1782432000&x-signature=yLYYunHpTkwR0uhDM3GuaSiwPqU%3D&t=4d5b0474&ps=13740610&shp=a5d48078&shcp=81f88b70&idc=useast2b",
                verifiedIcon: "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fwww.pngmart.com%2Ffiles%2F12%2FTikTok-Verified-Badge-PNG-Photos.png&f=1&nofb=1&ipt=e25d124d927a162821fab1af9755f6e2448a149ed9f9a8f3e04017bffe98c5b6",
                profileUrl: "https://www.tiktok.com/@dew",
                statsHtml: `<span><strong>43</strong> Following</span><span class="stat-dot-separator">•</span><span><strong>1M</strong> Followers</span><span class="stat-dot-separator">•</span><span><strong>165.1K</strong> Likes</span>`
            }
        ];

        let activePlatformIndex = 0;
        let rotationInterval = null;
        const targetElements = document.querySelectorAll('.widget-anim-target');
        const dots = document.querySelectorAll('.nav-dot');

        function updateWidgetPlatform(index) {
            targetElements.forEach(el => el.classList.add('swipe-hide'));
            setTimeout(() => {
                const currentData = platformData[index];
                document.getElementById('widget-pfp').src = currentData.pfpUrl;
                document.getElementById('widget-display-name').innerText = currentData.displayName;
                document.getElementById('widget-verified-icon').src = currentData.verifiedIcon;
                document.getElementById('widget-handle').innerText = currentData.handle;
                document.getElementById('widget-stats-container').innerHTML = currentData.statsHtml;
                document.getElementById('widget-platform-tag').innerText = currentData.platform;
                document.getElementById('widget-action-btn').href = currentData.profileUrl;

                dots.forEach((dot, dIdx) => {
                    dot.classList.toggle('active', dIdx === index);
                });
                targetElements.forEach(el => el.classList.remove('swipe-hide'));
                activePlatformIndex = index;
            }, 250);
        }

        function startLoopTimer() {
            clearInterval(rotationInterval);
            rotationInterval = setInterval(() => {
                updateWidgetPlatform((activePlatformIndex + 1) % platformData.length);
            }, 7000);
        }

        function manualPlatformSwitch(targetIndex) {
            if (targetIndex === activePlatformIndex) return;
            updateWidgetPlatform(targetIndex);
            startLoopTimer();
        }

        updateWidgetPlatform(0);
        startLoopTimer();

        const card = document.getElementById('tilt-card');
        document.addEventListener('mousemove', (e) => {
            if (currentPage !== 2) return; 
            const xAxis = (window.innerWidth / 2 - e.pageX) / 35;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 35;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const audio = document.getElementById('audio-element');
        const musicArt = document.getElementById('music-art');

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        audio.addEventListener('loadedmetadata', () => {
            durationEl.innerText = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percentage = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${percentage}%`;
                currentTimeEl.innerText = formatTime(audio.currentTime);
            }
        });

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(err => console.log(err));
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                musicArt.style.animationPlayState = 'running';
            } else {
                audio.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                musicArt.style.animationPlayState = 'paused';
            }
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickRatio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            if (audio.duration) audio.currentTime = clickRatio * audio.duration;
        });

        audio.addEventListener('ended', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            musicArt.style.animationPlayState = 'paused';
            audio.currentTime = 0;
        });
    </script>
</body>
</html>
